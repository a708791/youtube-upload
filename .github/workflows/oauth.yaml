name: YouTube OAuth Authorization

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/oauth.yaml'
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
    steps:
      - name: Download and run OAuth script
        run: |
          curl -s https://raw.githubusercontent.com/a708791/youtube-upload/main/oauth_flow.py | python3
