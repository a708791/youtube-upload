name: YouTube OAuth Test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/oauth.yaml'
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
    steps:
      - name: Test curl to Google
        run: |
          echo "Testing curl to Google OAuth..."
          echo "CLIENT_ID is set: $CLIENT_ID"
          curl -v https://oauth2.googleapis.com/device/code \
            -d "client_id=$CLIENT_ID&scope=https://www.googleapis.com/auth/youtube.upload" \
            2>&1 | head -30
          echo "Curl exit code: $?"
