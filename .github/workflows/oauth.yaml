name: YouTube OAuth Authorization

on:
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    outputs:
      cred_base64: ${{ steps.poll.outputs.cred_base64 }}
    steps:
      - name: Generate device code
        id: device
        env:
          CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
        run: |
          response=$(curl -s -X POST https://oauth2.googleapis.com/device/code \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$CLIENT_ID&scope=https://www.googleapis.com/auth/youtube.upload")
          
          device_code=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('device_code',''))")
          user_code=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('user_code',''))")
          verification_url=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('verification_url',''))")
          
          echo "device_code=$device_code" >> $GITHUB_OUTPUT
          echo "user_code=$user_code" >> $GITHUB_OUTPUT
          echo "verification_url=$verification_url" >> $GITHUB_OUTPUT
          
          echo ""
          echo "=========================================="
          echo "VISIT THIS URL IN YOUR BROWSER:"
          echo "$verification_url"
          echo "=========================================="
          echo "ENTER THIS USER CODE:"
          echo "$user_code"
          echo "=========================================="
          echo "CLICK ALLOW, THEN COME BACK"
          echo "=========================================="

      - name: Poll for token
        id: poll
        env:
          CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          device_code="${{ steps.device.outputs.device_code }}"
          
          for i in $(seq 1 60); do
            sleep 5
            
            response=$(curl -s -X POST https://oauth2.googleapis.com/token \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "client_id=$CLIENT_ID&client_secret=$CLIENT_SECRET&code=$device_code&grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Adevice_code")
            
            access_token=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null)
            
            if [ -n "$access_token" ]; then
              echo ""
              echo "=========================================="
              echo "AUTHORIZATION SUCCESS!"
              echo "=========================================="
              refresh_token=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('refresh_token',''))" 2>/dev/null)
              
              credentials_json=$(python3 -c "
import json, sys
cred = {
  'access_token': '''$access_token''',
  'refresh_token': '''$refresh_token''',
  'token_uri': 'https://oauth2.googleapis.com/token',
  'client_id': '''$CLIENT_ID''',
  'client_secret': '''$CLIENT_SECRET''',
  'expiry': '2026-07-12T00:00:00Z'
}
print(json.dumps(cred))
")
              
              # Base64 encode for output
              cred_base64=$(echo -n "$credentials_json" | base64 -w0)
              echo "cred_base64=$cred_base64" >> $GITHUB_OUTPUT
              echo "status=success" >> $GITHUB_OUTPUT
              
              echo ""
              echo "=========================================="
              echo "CREDENTIALS BASE64:"
              echo "$cred_base64"
              echo "=========================================="
              echo "SAVE THIS VALUE AND USE IT TO UPLOAD"
              echo "=========================================="
              exit 0
            fi
            
            error=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('error','unknown'))" 2>/dev/null)
            if [ "$error" != "authorization_pending" ]; then
              echo "Error: $error"
              echo "status=failed" >> $GITHUB_OUTPUT
              exit 1
            fi
          done
          
          echo "TIMEOUT"
          echo "status=timeout" >> $GITHUB_OUTPUT
          exit 1
