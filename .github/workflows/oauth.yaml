name: YouTube OAuth Authorization

on:
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authorize YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, base64, os, time, sys

          CLIENT_ID = os.environ['YOUTUBE_CLIENT_ID']
          CLIENT_SECRET = os.environ['YOUTUBE_CLIENT_SECRET']

          data = urllib.parse.urlencode({
              'client_id': CLIENT_ID,
              'scope': 'https://www.googleapis.com/auth/youtube.upload'
          }).encode()
          req = urllib.request.Request('https://oauth2.googleapis.com/device/code', data=data)
          resp = urllib.request.urlopen(req, timeout=60)
          result = json.loads(resp.read())

          dc = result['device_code']
          uc = result['user_code']
          vu = result['verification_url']
          interval = result.get('interval', 5)

          print('=' * 60)
          print('OPEN THIS URL IN YOUR BROWSER:')
          print(vu)
          print('=' * 60)
          print('ENTER THIS CODE:', uc)
          print('=' * 60)
          print('CLICK ALLOW, THEN WAIT...')
          sys.stdout.flush()

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'verification_url={vu}\n')
              f.write(f'user_code={uc}\n')
              f.write(f'device_code={dc}\n')

          for i in range(120):
              time.sleep(interval)
              data = urllib.parse.urlencode({
                  'client_id': CLIENT_ID,
                  'client_secret': CLIENT_SECRET,
                  'code': dc,
                  'grant_type': 'urn:ietf:params:oauth:grant-type:device_code'
              }).encode()
              req = urllib.request.Request('https://oauth2.googleapis.com/token', data=data)
              try:
                  resp = urllib.request.urlopen(req, timeout=60)
                  result = json.loads(resp.read())
              except Exception as e:
                  print(f'Waiting... ({i+1}/120)')
                  sys.stdout.flush()
                  continue

              if 'access_token' in result:
                  at = result['access_token']
                  rt = result.get('refresh_token', '')
                  expiry = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime(time.time() + 3600))
                  cred = {
                      'access_token': at,
                      'refresh_token': rt,
                      'token_uri': 'https://oauth2.googleapis.com/token',
                      'client_id': CLIENT_ID,
                      'client_secret': CLIENT_SECRET,
                      'expiry': expiry
                  }
                  cred_b64 = base64.b64encode(json.dumps(cred).encode()).decode()
                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f'cred_base64={cred_b64}\n')
                      f.write('status=success\n')
                  print('AUTHORIZATION SUCCESS!')
                  exit(0)

              err = result.get('error', 'unknown')
              if err != 'authorization_pending':
                  print(f'Error: {err}')
                  exit(1)
              print(f'Waiting... ({i+1}/120)')
              sys.stdout.flush()

          print('TIMEOUT')
          exit(1)
          PYEOF
