name: YouTube OAuth Test v11

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/oauth.yaml'
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
    steps:
      - name: Test
        run: |
          echo "CLIENT_ID is set: $CLIENT_ID"
          echo "CLIENT_SECRET first 5: ${CLIENT_SECRET:0:5}"
          python3 -c "print('CLIENT_ID from python:', '$CLIENT_ID')"
