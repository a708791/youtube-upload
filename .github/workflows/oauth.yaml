name: YouTube OAuth Test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/oauth.yaml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test
        run: |
          echo "Workflow triggered!"
          echo "CLIENT_ID is ${{ secrets.YOUTUBE_CLIENT_ID }}"
          echo "CLIENT_ID first 10 chars: ${{ secrets.YOUTUBE_CLIENT_ID }}"
          python3 -c "print('Python works!')"
          curl --version | head -1
          echo "Done!"
