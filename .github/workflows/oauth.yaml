name: OAuth v21 - Test raw connectivity

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/oauth.yaml'
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Test connectivity
        run: |
          echo "Testing raw.githubusercontent.com..."
          curl -v --max-time 30 https://raw.githubusercontent.com 2>&1 | head -30
          echo "Exit: $?"
