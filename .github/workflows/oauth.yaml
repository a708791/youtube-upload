name: OAuth v19 - Test curl to raw

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/oauth.yaml'
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Test curl
        run: |
          echo "Testing curl..."
          curl -v https://raw.githubusercontent.com/a708791/youtube-upload/main/oauth_flow.py 2>&1 | head -20
