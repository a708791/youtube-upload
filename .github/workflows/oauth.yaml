name: OAuth v16 Test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/oauth.yaml'
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
    steps:
      - name: Test
        run: |
          echo "Testing Python in YAML"
          python3 -c 'import json; print("CLIENT_ID:", "'$CLIENT_ID'")'
          echo "Done"
