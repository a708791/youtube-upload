name: OAuth v15 Test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/oauth.yaml'
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    env:
      CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
    steps:
      - name: Test multiline python
        run: |
          python3 -c "
import json
print('CLIENT_ID:', '$CLIENT_ID')
print('MULTILINE works!')
"
